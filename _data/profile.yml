short_bio: >-
  <p>
    I am a 3rd year PhD student in the <a href="https://www.clsp.jhu.edu/" target="_blank">Center for Language and Speech Processing (CLSP)</a> at <a href="https://www.jhu.edu/" target="_blank">Johns Hopkins University (JHU)</a>, advised by Professor <a href="https://www.clsp.jhu.edu/faculty/sanjeev-khudanpur/" target="_blank">Sanjeev Khudanpur</a>.
  </p>
  <p>
    My research interests include:
  </p>
  <ul>
    <li>Audio / Omni Large Language Models</li>
    <li>Cross-Modal Reasoning</li>
    <li>Speech Translation and Recognition</li>
    <li>Speech / Natural Language Processing</li>
  </ul>
  <p>
    I will be on the job market starting Spring/Fall 2027.
  </p>

